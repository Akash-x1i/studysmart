services:
  - type: web
    name: studysmart-api
    runtime: node
    plan: free
    buildCommand: cd api && npm install
    startCommand: cd api && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NVIDIA_MODEL
        value: deepseek-ai/deepseek-v4-pro
      - key: NVIDIA_API_KEY
        sync: false
