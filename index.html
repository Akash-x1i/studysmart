<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySmart — Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-pattern" aria-hidden="true"></div>

    <header class="site-header">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true">◆</span>
        <span>StudySmart</span>
      </div>
      <p class="tagline">Pick a topic and test what you know</p>
    </header>

    <main id="app" class="main">
      <!-- Screens injected by JS -->
    </main>

    <footer class="site-footer">
      <p>Use keys <kbd>1</kbd>–<kbd>4</kbd> to answer when a question is shown.</p>
    </footer>

    <script src="quiz-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
